<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>讀書筆記本 | Reading Notebook</title>
    
    <!-- Google Fonts: Inter & Noto Sans TC -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'Noto Sans TC', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            50: '#f0fdfa',
                            100: '#ccfbf1',
                            500: '#14b8a6', // Teal
                            600: '#0d9488',
                            700: '#0f766e',
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            background-color: #f8fafc;
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 20px 20px;
        }
        /* Custom scrollbar for modern feel */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>

    <!-- React & ReactDOM (CDN) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel (CDN) for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="text-slate-800 antialiased min-h-screen selection:bg-primary-100 selection:text-primary-700">
    <div id="root"></div>

    <!-- 載入 React 應用程式 -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- SVGs ---
        const PlusIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
        const BookOpenIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>;
        const TrashIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>;
        const StarIcon = ({ filled }) => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill={filled ? "#fbbf24" : "none"} stroke={filled ? "#fbbf24" : "currentColor"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>;
        const BookmarkIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>;

        // --- Hooks ---
        function useLocalStorage(key, initialValue) {
            const [storedValue, setStoredValue] = useState(() => {
                try {
                    const item = window.localStorage.getItem(key);
                    return item ? JSON.parse(item) : initialValue;
                } catch (error) {
                    console.error(error);
                    return initialValue;
                }
            });

            const setValue = (value) => {
                try {
                    const valueToStore = value instanceof Function ? value(storedValue) : value;
                    setStoredValue(valueToStore);
                    window.localStorage.setItem(key, JSON.stringify(valueToStore));
                } catch (error) {
                    console.error(error);
                }
            };
            return [storedValue, setValue];
        }

        // --- Components ---
        const BookCard = ({ book, onDelete }) => {
            return (
                <div className="glass-panel rounded-2xl p-6 shadow-sm hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1 group relative overflow-hidden flex flex-col h-full border border-slate-200/60">
                    <div className="absolute top-0 right-0 -mt-4 -mr-4 w-24 h-24 bg-primary-500/10 rounded-full blur-2xl z-0 pointer-events-none"></div>
                    
                    <div className="relative z-10 flex-grow">
                        <div className="flex justify-between items-start mb-4">
                            <div>
                                <h3 className="text-xl font-bold text-slate-800 leading-tight mb-1">{book.title}</h3>
                                <p className="text-slate-500 text-sm font-medium">{book.author}</p>
                            </div>
                            <button 
                                onClick={() => onDelete(book.id)}
                                className="text-slate-400 hover:text-red-500 transition-colors p-2 rounded-full hover:bg-red-50 opacity-0 group-hover:opacity-100 focus:opacity-100"
                                title="刪除書籍"
                            >
                                <TrashIcon />
                            </button>
                        </div>

                        <div className="mb-5">
                            <div className="flex justify-between text-xs text-slate-500 font-semibold mb-2">
                                <span>閱讀進度</span>
                                <span className="text-primary-600">{book.progress}%</span>
                            </div>
                            <div className="w-full bg-slate-100 rounded-full h-2.5 overflow-hidden">
                                <div 
                                    className="bg-primary-500 h-2.5 rounded-full transition-all duration-1000 ease-out" 
                                    style={{ width: `${book.progress}%` }}
                                ></div>
                            </div>
                        </div>
                        
                        {book.tags && book.tags.length > 0 && (
                            <div className="flex flex-wrap gap-2 mb-4">
                                {book.tags.map((tag, idx) => (
                                    <span key={idx} className="px-2.5 py-1 bg-slate-100 text-slate-600 text-xs font-medium rounded-md border border-slate-200">
                                        {tag}
                                    </span>
                                ))}
                            </div>
                        )}
                    </div>

                    <div className="relative z-10 flex items-center justify-between mt-auto pt-4 border-t border-slate-100">
                        <div className="flex gap-1">
                            {[1, 2, 3, 4, 5].map((star) => (
                                <StarIcon key={star} filled={star <= (book.rating || 0)} />
                            ))}
                        </div>
                        <button className="flex items-center gap-1.5 text-xs font-semibold text-primary-600 hover:text-primary-700 bg-primary-50 hover:bg-primary-100 px-3 py-1.5 rounded-full transition-colors">
                            <BookmarkIcon />
                            <span>筆記</span>
                        </button>
                    </div>
                </div>
            );
        };

        const AddBookModal = ({ isOpen, onClose, onAdd }) => {
            const [title, setTitle] = useState('');
            const [author, setAuthor] = useState('');
            const [progress, setProgress] = useState(0);
            const [tags, setTags] = useState('');

            if (!isOpen) return null;

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!title.trim()) return;
                
                onAdd({
                    id: Date.now().toString(),
                    title,
                    author,
                    progress: Number(progress),
                    tags: tags.split(',').map(t => t.trim()).filter(t => t),
                    rating: 0,
                    dateAdded: new Date().toISOString()
                });
                
                setTitle('');
                setAuthor('');
                setProgress(0);
                setTags('');
                onClose();
            };

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm transition-opacity">
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden transform transition-all border border-slate-200">
                        <div className="px-6 py-5 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                            <h2 className="text-lg font-bold text-slate-800 flex items-center gap-2">
                                <BookOpenIcon />
                                新增書籍
                            </h2>
                            <button onClick={onClose} className="text-slate-400 hover:text-slate-600 p-1 font-bold text-xl">
                                ✕
                            </button>
                        </div>
                        
                        <form onSubmit={handleSubmit} className="p-6">
                            <div className="space-y-4">
                                <div>
                                    <label className="block text-sm font-semibold text-slate-700 mb-1.5">書名 <span className="text-red-500">*</span></label>
                                    <input 
                                        type="text" 
                                        required
                                        value={title}
                                        onChange={(e) => setTitle(e.target.value)}
                                        className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition-all"
                                        placeholder="例如：原子習慣"
                                    />
                                </div>
                                
                                <div>
                                    <label className="block text-sm font-semibold text-slate-700 mb-1.5">作者</label>
                                    <input 
                                        type="text" 
                                        value={author}
                                        onChange={(e) => setAuthor(e.target.value)}
                                        className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition-all"
                                        placeholder="例如：詹姆斯‧清"
                                    />
                                </div>

                                <div>
                                    <label className="block text-sm font-semibold text-slate-700 mb-1.5 flex justify-between">
                                        目前進度 
                                        <span className="text-primary-600 font-bold">{progress}%</span>
                                    </label>
                                    <input 
                                        type="range" 
                                        min="0" max="100" 
                                        value={progress}
                                        onChange={(e) => setProgress(e.target.value)}
                                        className="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-primary-500"
                                    />
                                </div>

                                <div>
                                    <label className="block text-sm font-semibold text-slate-700 mb-1.5">分類標籤 (以逗號分隔)</label>
                                    <input 
                                        type="text" 
                                        value={tags}
                                        onChange={(e) => setTags(e.target.value)}
                                        className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition-all"
                                        placeholder="例如：自我成長, 心理學"
                                    />
                                </div>
                            </div>
                            
                            <div className="mt-8 flex gap-3">
                                <button 
                                    type="button" 
                                    onClick={onClose}
                                    className="flex-1 px-4 py-2.5 bg-white border border-slate-200 text-slate-600 font-semibold rounded-xl hover:bg-slate-50 transition-colors"
                                >
                                    取消
                                </button>
                                <button 
                                    type="submit" 
                                    className="flex-1 px-4 py-2.5 bg-primary-600 text-white font-semibold rounded-xl hover:bg-primary-700 shadow-md shadow-primary-500/20 transition-all"
                                >
                                    加入書單
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [books, setBooks] = useLocalStorage('reading-notebook-books', []);
            const [isModalOpen, setIsModalOpen] = useState(false);

            const handleAddBook = (newBook) => {
                setBooks([newBook, ...books]);
            };

            const handleDeleteBook = (id) => {
                if (window.confirm('確定要刪除這本書嗎？')) {
                    setBooks(books.filter(book => book.id !== id));
                }
            };

            return (
                <div className="max-w-6xl mx-auto px-4 py-8 sm:px-6 lg:px-8">
                    {/* Header */}
                    <header className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-10 gap-4">
                        <div>
                            <h1 className="text-3xl font-extrabold text-slate-900 tracking-tight flex items-center gap-3">
                                <span className="p-2 bg-primary-500 text-white rounded-xl shadow-sm shadow-primary-500/30">
                                    <BookOpenIcon />
                                </span>
                                讀書筆記本
                            </h1>
                            <p className="mt-2 text-slate-500 font-medium">記錄閱讀點滴，沉澱知識精華</p>
                        </div>
                        
                        <button 
                            onClick={() => setIsModalOpen(true)}
                            className="flex items-center gap-2 bg-slate-900 text-white px-5 py-2.5 rounded-xl font-semibold hover:bg-slate-800 transition-all shadow-md hover:shadow-lg transform hover:-translate-y-0.5"
                        >
                            <PlusIcon />
                            <span>新增書籍</span>
                        </button>
                    </header>

                    {/* Main Content */}
                    <main>
                        {books.length === 0 ? (
                            <div className="glass-panel text-center py-24 rounded-3xl border border-dashed border-slate-300">
                                <div className="mx-auto w-16 h-16 bg-primary-50 text-primary-500 rounded-full flex items-center justify-center mb-4">
                                    <BookOpenIcon />
                                </div>
                                <h3 className="text-lg font-bold text-slate-700 mb-2">書單還是空的</h3>
                                <p className="text-slate-500 max-w-sm mx-auto mb-6">開始建立你的專屬閱讀庫，記錄每一本改變你的好書。</p>
                                <button 
                                    onClick={() => setIsModalOpen(true)}
                                    className="inline-flex items-center gap-2 text-primary-600 font-semibold hover:text-primary-700 bg-primary-50 hover:bg-primary-100 px-6 py-2.5 rounded-xl transition-colors"
                                >
                                    <PlusIcon />
                                    立即新增第一本書
                                </button>
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                                {books.map(book => (
                                    <BookCard 
                                        key={book.id} 
                                        book={book} 
                                        onDelete={handleDeleteBook}
                                    />
                                ))}
                            </div>
                        )}
                    </main>

                    {/* Modal */}
                    <AddBookModal 
                        isOpen={isModalOpen} 
                        onClose={() => setIsModalOpen(false)} 
                        onAdd={handleAddBook}
                    />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
